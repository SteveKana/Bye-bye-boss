name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  NODE_VERSION: '22.23.1'
  PNPM_VERSION: '11.15.1'

jobs:
  validate:
    name: Lint, format, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: ESLint
        run: pnpm lint

      - name: Prettier
        run: pnpm exec prettier --check .

      - name: Build
        run: pnpm build
        env:
          NODE_ENV: production

      - name: Verify build output
        run: test -f .output/server/index.mjs

  staging:
    name: Deploy dev.byebyeboss.fr
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://dev.byebyeboss.fr
    steps:
      - name: Trigger deployment
        run: |
          install -d -m 700 ~/.ssh
          printf '%s\n' "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          printf '%s\n' "${{ secrets.DEPLOY_KEY_STAGING }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh -i ~/.ssh/id_deploy -o BatchMode=yes deploy@46.62.246.17 "$GITHUB_SHA"
        env:
          GITHUB_SHA: ${{ github.sha }}

  production:
    name: Deploy byebyeboss.fr
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://byebyeboss.fr
    steps:
      - name: Trigger deployment
        run: |
          install -d -m 700 ~/.ssh
          printf '%s\n' "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          printf '%s\n' "${{ secrets.DEPLOY_KEY_PRODUCTION }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh -i ~/.ssh/id_deploy -o BatchMode=yes deploy@46.62.246.17 "$GITHUB_SHA"
        env:
          GITHUB_SHA: ${{ github.sha }}
